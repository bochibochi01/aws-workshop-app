version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "Running Unit Test"
      - mvn test

  build:
    commands:
      - echo "Building Application"
      - mvn clean package

artifacts:
  files:
    - target/*.jar
    - appspec.yml
    - scripts/**/*
