version: 0.0

os: linux

files:
  - source: target/workshop-0.0.1-SNAPSHOT.jar
    destination: /opt/workshop

permissions:
  - object: /opt/workshop
    owner: ec2-user
    group: ec2-user

hooks:

  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user

  BeforeInstall:
    - location: scripts/before-install.sh
      timeout: 60
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60
      runas: ec2-user

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: ec2-user
